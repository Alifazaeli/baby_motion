name: baby_motion
description: AI Storytelling App for Toddlers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Auth
  google_sign_in: ^6.2.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # HTTP
  dio: ^5.4.3+1

  # Audio playback
  just_audio: ^0.9.40

  # Image caching
  cached_network_image: ^3.3.1

  # Local persistence
  shared_preferences: ^2.3.1

  # i18n
  intl: ^0.19.0

  # Utilities
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
